<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI助手 - 问茧</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .chat-box {
            height: 400px;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 10px;
            overflow-y: auto;
            margin-bottom: 20px;
            /* 优化滚动性能 */
            will-change: transform;
            contain: layout style paint;
        }
        .message {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 5px;
            /* 优化渲染性能 */
            contain: layout style;
        }
        .user-message {
            background-color: #e3f2fd;
            text-align: right;
        }
        .ai-message {
            background-color: #f1f1f1;
        }
        .input-area {
            display: flex;
        }
        .input-area input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-right: 10px;
        }
        .input-area button {
            padding: 10px 20px;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .input-area button:hover {
            background-color: #45a049;
        }
        .input-area button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .api-config {
            margin-bottom: 20px;
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 5px;
            border: 1px solid #ddd;
        }
        .api-config h3 {
            margin-top: 0;
            color: #333;
        }
        .api-config input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            transition: border-color 0.3s ease;
        }
        .api-config input:focus {
            outline: none;
            border-color: #4caf50;
        }
        .api-config .config-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .api-config .config-row input {
            flex: 1;
        }
        .error-message {
            color: #d32f2f;
            background-color: #ffebee;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 10px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-status {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
            text-align: right;
        }
        .typing-indicator {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .typing-dot {
            width: 8px;
            height: 8px;
            background-color: #666;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) {
            animation-delay: -0.32s;
        }
        .typing-dot:nth-child(2) {
            animation-delay: -0.16s;
        }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI助手</h1>
        
        <!-- API配置部分 -->
        <div class="api-config">
            <h3>DeepSeek API配置</h3>
            <div id="error-container"></div>
            <div class="config-row">
                <input type="text" id="api-key" placeholder="请输入DeepSeek API密钥" value="">
            </div>
            <div class="config-row">
                <input type="text" id="api-url" placeholder="API URL" value="https://api.deepseek.com/v1/chat/completions">
            </div>
            <div class="config-row">
                <input type="text" id="model" placeholder="模型名称" value="deepseek-chat">
                <input type="number" id="temperature" placeholder="温度" value="0.7" min="0" max="1" step="0.1">
            </div>
            <div class="config-row">
                <input type="number" id="max-tokens" placeholder="最大令牌数" value="1000" min="1">
                <input type="number" id="timeout" placeholder="超时时间(秒)" value="30" min="1">
            </div>
        </div>
        
        <div class="chat-box" id="chat-box">
            <div class="message ai-message">你好！我是AI助手，有什么可以帮助你的吗？</div>
        </div>
        <div class="input-area">
            <input type="text" id="message-input" placeholder="请输入你的问题...">
            <button onclick="sendMessage()">发送</button>
        </div>
    </div>
    <script>
        // 性能优化：缓存DOM元素
        const DOM = {
            chatBox: null,
            messageInput: null,
            sendButton: null,
            errorContainer: null,
            apiKey: null,
            apiUrl: null,
            model: null,
            temperature: null,
            maxTokens: null,
            timeout: null
        };
        
        // 聊天历史记录
        let chatHistory = [
            { role: 'system', content: '你是一个智能AI助手，帮助用户解决问题。' }
        ];
        
        // 配置参数
        const config = {
            maxHistoryLength: 50, // 最大聊天历史长度
            typingSpeed: 30, // 打字速度（毫秒/字符）
            debounceDelay: 300, // 防抖延迟
            retryAttempts: 3, // API重试次数
            retryDelay: 1000 // 重试延迟
        };
        
        // 状态管理
        let isProcessing = false;
        let currentRequest = null;
        
        // 初始化DOM元素
        function initDOM() {
            DOM.chatBox = document.getElementById('chat-box');
            DOM.messageInput = document.getElementById('message-input');
            DOM.sendButton = document.querySelector('.input-area button');
            DOM.errorContainer = document.getElementById('error-container');
            DOM.apiKey = document.getElementById('api-key');
            DOM.apiUrl = document.getElementById('api-url');
            DOM.model = document.getElementById('model');
            DOM.temperature = document.getElementById('temperature');
            DOM.maxTokens = document.getElementById('max-tokens');
            DOM.timeout = document.getElementById('timeout');
        }
        
        // 防抖函数
        function debounce(func, delay) {
            let timeoutId;
            return function(...args) {
                clearTimeout(timeoutId);
                timeoutId = setTimeout(() => func.apply(this, args), delay);
            };
        }
        
        // 显示错误信息
        function showError(message) {
            DOM.errorContainer.innerHTML = `<div class="error-message">${message}</div>`;
            setTimeout(() => {
                DOM.errorContainer.innerHTML = '';
            }, 5000);
        }
        
        // 优化DOM操作：使用DocumentFragment
        function addMessage(message, isUser = false) {
            const fragment = document.createDocumentFragment();
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
            messageDiv.textContent = message;
            
            // 添加消息时间戳
            const statusDiv = document.createElement('div');
            statusDiv.className = 'message-status';
            statusDiv.textContent = new Date().toLocaleTimeString();
            messageDiv.appendChild(statusDiv);
            
            fragment.appendChild(messageDiv);
            DOM.chatBox.appendChild(fragment);
            scrollToBottom();
        }
        
        // 滚动到底部
        function scrollToBottom() {
            DOM.chatBox.scrollTop = DOM.chatBox.scrollHeight;
        }
        
        // 显示打字指示器
        function showTypingIndicator() {
            const fragment = document.createDocumentFragment();
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typing-indicator';
            typingDiv.className = 'message ai-message';
            typingDiv.innerHTML = `
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            fragment.appendChild(typingDiv);
            DOM.chatBox.appendChild(fragment);
            scrollToBottom();
        }
        
        // 隐藏打字指示器
        function hideTypingIndicator() {
            const typingIndicator = document.getElementById('typing-indicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }
        
        // 打字效果
        function typeMessage(message, callback) {
            const fragment = document.createDocumentFragment();
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ai-message';
            fragment.appendChild(messageDiv);
            DOM.chatBox.appendChild(fragment);
            
            let index = 0;
            function typeNext() {
                if (index < message.length) {
                    messageDiv.textContent += message.charAt(index);
                    index++;
                    scrollToBottom();
                    setTimeout(typeNext, config.typingSpeed);
                } else {
                    // 添加时间戳
                    const statusDiv = document.createElement('div');
                    statusDiv.className = 'message-status';
                    statusDiv.textContent = new Date().toLocaleTimeString();
                    messageDiv.appendChild(statusDiv);
                    scrollToBottom();
                    if (callback) callback();
                }
            }
            typeNext();
        }
        
        // 发送消息到DeepSeek API（带重试机制）
        async function sendToDeepSeek(message, attempt = 1) {
            try {
                // 获取API配置
                const apiKey = DOM.apiKey.value.trim();
                const apiUrl = DOM.apiUrl.value.trim();
                const model = DOM.model.value.trim();
                const temperature = parseFloat(DOM.temperature.value);
                const maxTokens = parseInt(DOM.maxTokens.value);
                const timeout = parseInt(DOM.timeout.value) * 1000;
                
                // 验证API密钥
                if (!apiKey) {
                    throw new Error('请输入DeepSeek API密钥');
                }
                
                // 限制聊天历史长度
                if (chatHistory.length > config.maxHistoryLength) {
                    // 保留系统消息和最近的消息
                    chatHistory = [chatHistory[0], ...chatHistory.slice(-(config.maxHistoryLength - 1))];
                }
                
                // 更新聊天历史
                chatHistory.push({ role: 'user', content: message });
                
                // 准备请求数据
                const requestData = {
                    model: model,
                    messages: chatHistory,
                    temperature: temperature,
                    max_tokens: maxTokens
                };
                
                // 设置超时
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), timeout);
                
                // 保存当前请求控制器
                currentRequest = controller;
                
                // 发送请求
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify(requestData),
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                currentRequest = null;
                
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error?.message || `API请求失败: ${response.status}`);
                }
                
                const data = await response.json();
                const aiResponse = data.choices[0].message.content;
                
                // 更新聊天历史
                chatHistory.push({ role: 'assistant', content: aiResponse });
                
                return aiResponse;
            } catch (error) {
                clearTimeout(timeoutId);
                currentRequest = null;
                
                if (error.name === 'AbortError') {
                    throw new Error('API请求超时');
                }
                
                // 重试机制
                if (attempt < config.retryAttempts) {
                    await new Promise(resolve => setTimeout(resolve, config.retryDelay));
                    return sendToDeepSeek(message, attempt + 1);
                }
                
                throw error;
            }
        }
        
        // 发送消息函数
        async function sendMessage() {
            const message = DOM.messageInput.value.trim();
            
            if (message && !isProcessing) {
                isProcessing = true;
                
                // 禁用发送按钮，显示加载状态
                DOM.sendButton.disabled = true;
                DOM.sendButton.innerHTML = '<div class="loading"></div>';
                
                // 添加用户消息
                addMessage(message, true);
                
                // 清空输入
                DOM.messageInput.value = '';
                
                try {
                    // 显示打字指示器
                    showTypingIndicator();
                    
                    // 调用DeepSeek API
                    const aiResponse = await sendToDeepSeek(message);
                    
                    // 隐藏打字指示器
                    hideTypingIndicator();
                    
                    // 使用打字效果显示AI回复
                    typeMessage(aiResponse, () => {
                        isProcessing = false;
                        DOM.sendButton.disabled = false;
                        DOM.sendButton.innerHTML = '发送';
                    });
                } catch (error) {
                    // 隐藏打字指示器
                    hideTypingIndicator();
                    
                    // 显示错误信息
                    showError(`错误: ${error.message}`);
                    
                    // 添加错误回复
                    addMessage(`抱歉，我无法处理你的请求。错误: ${error.message}`);
                    
                    // 恢复发送按钮状态
                    isProcessing = false;
                    DOM.sendButton.disabled = false;
                    DOM.sendButton.innerHTML = '发送';
                }
            }
        }
        
        // 取消当前请求
        function cancelRequest() {
            if (currentRequest) {
                currentRequest.abort();
                currentRequest = null;
                isProcessing = false;
                DOM.sendButton.disabled = false;
                DOM.sendButton.innerHTML = '发送';
                hideTypingIndicator();
                showError('请求已取消');
            }
        }
        
        // 绑定事件
        function bindEvents() {
            // 绑定回车键
            DOM.messageInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });
            
            // 保存API配置到本地存储（防抖处理）
            const saveConfig = debounce(function() {
                const config = {
                    apiKey: DOM.apiKey.value,
                    apiUrl: DOM.apiUrl.value,
                    model: DOM.model.value,
                    temperature: DOM.temperature.value,
                    maxTokens: DOM.maxTokens.value,
                    timeout: DOM.timeout.value
                };
                localStorage.setItem('deepseekConfig', JSON.stringify(config));
            }, config.debounceDelay);
            
            document.querySelectorAll('.api-config input').forEach(input => {
                input.addEventListener('input', saveConfig);
            });
        }
        
        // 从本地存储加载API配置
        function loadConfig() {
            const savedConfig = localStorage.getItem('deepseekConfig');
            if (savedConfig) {
                try {
                    const config = JSON.parse(savedConfig);
                    DOM.apiKey.value = config.apiKey || '';
                    DOM.apiUrl.value = config.apiUrl || 'https://api.deepseek.com/v1/chat/completions';
                    DOM.model.value = config.model || 'deepseek-chat';
                    DOM.temperature.value = config.temperature || '0.7';
                    DOM.maxTokens.value = config.maxTokens || '1000';
                    DOM.timeout.value = config.timeout || '30';
                } catch (error) {
                    console.error('加载配置失败:', error);
                }
            }
        }
        
        // 页面加载完成后初始化
        window.onload = function() {
            initDOM();
            loadConfig();
            bindEvents();
        };
    </script>
</body>
</html>
