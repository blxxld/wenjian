<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试页面2</title>
</head>
<body>
    <h1>测试页面2</h1>
    <p>如果看到此消息，说明HTML加载正常</p>
    <div id="test-result"></div>
    
    <script>
        console.log('普通JavaScript加载成功');
        document.getElementById('test-result').textContent = '普通JavaScript加载成功';
        
        // 测试本地存储
        try {
            localStorage.setItem('test', 'test');
            document.getElementById('test-result').textContent += ' | 本地存储正常';
        } catch (error) {
            document.getElementById('test-result').textContent += ' | 本地存储失败: ' + error.message;
        }
    </script>
</body>
</html>
