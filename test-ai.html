<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试AI助手</title>
    <style>
        .ai-chat-body {
            height: 300px;
            border: 1px solid #ccc;
            padding: 10px;
            overflow-y: auto;
            margin-bottom: 10px;
        }
        .user-message, .ai-message {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 5px;
        }
        .user-message {
            background-color: #e3f2fd;
            text-align: right;
        }
        .ai-message {
            background-color: #f5f5f5;
        }
        .ai-chat-input {
            display: flex;
        }
        .ai-chat-input input {
            flex: 1;
            padding: 10px;
            margin-right: 10px;
        }
        .ai-chat-input button {
            padding: 10px 20px;
        }
    </style>
</head>
<body>
    <h1>测试AI助手</h1>
    <div class="ai-chat-body" id="chat-body">
        <div class="ai-message">
            你好！我是AI助手，有什么可以帮助你的吗？
        </div>
    </div>
    <div class="ai-chat-input">
        <input type="text" id="chat-input" placeholder="请输入你的问题...">
        <button type="button" id="send-btn" onclick="sendMessage()">发送</button>
    </div>
    <script>
        function sendMessage() {
            alert('发送按钮被点击');
            var chatBody = document.getElementById('chat-body');
            var chatInput = document.getElementById('chat-input');
            var message = chatInput.value.trim();
            
            if (message) {
                // 显示用户消息
                var userDiv = document.createElement('div');
                userDiv.className = 'user-message';
                userDiv.innerHTML = message;
                chatBody.appendChild(userDiv);
                
                // 清空输入框
                chatInput.value = '';
                
                // 显示AI响应
                setTimeout(function() {
                    var aiDiv = document.createElement('div');
                    aiDiv.className = 'ai-message';
                    aiDiv.innerHTML = '这是AI的回复，你刚才说: ' + message;
                    chatBody.appendChild(aiDiv);
                }, 1000);
            }
        }
    </script>
</body>
</html>
