<!DOCTYPE html>
<html>
<head>
    <title>Text Change Test</title>
</head>
<body>
    <h1>Text Change Test</h1>
    <p id="test-paragraph">This text will be changed by JavaScript.</p>
    <button onclick="changeText()">Change Text</button>
    <script>
        function changeText() {
            document.getElementById('test-paragraph').textContent = 'JavaScript is working!';
        }
    </script>
</body>
</html>
