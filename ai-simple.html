<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单AI助手</title>
    <style>
        .chat-body {
            height: 300px;
            border: 1px solid #ccc;
            padding: 10px;
            overflow-y: auto;
            margin-bottom: 10px;
        }
        .user-message {
            background-color: #e3f2fd;
            text-align: right;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
        }
        .ai-message {
            background-color: #f5f5f5;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
        }
        .chat-input {
            display: flex;
        }
        .chat-input input {
            flex: 1;
            padding: 10px;
            margin-right: 10px;
        }
        .chat-input button {
            padding: 10px 20px;
        }
    </style>
</head>
<body>
    <h1>简单AI助手</h1>
    <div class="chat-body" id="chat-body">
        <div class="ai-message">你好！我是AI助手，有什么可以帮助你的吗？</div>
    </div>
    <div class="chat-input">
        <input type="text" id="chat-input" placeholder="请输入你的问题...">
        <button onclick="sendMessage()">发送</button>
    </div>
    <script>
        function sendMessage() {
            var chatBody = document.getElementById('chat-body');
            var chatInput = document.getElementById('chat-input');
            var message = chatInput.value.trim();
            
            if (message) {
                // 显示用户消息
                chatBody.innerHTML += '<div class="user-message">' + message + '</div>';
                
                // 清空输入框
                chatInput.value = '';
                
                // 显示AI响应
                setTimeout(function() {
                    chatBody.innerHTML += '<div class="ai-message">这是AI的回复，你刚才说: ' + message + '</div>';
                }, 1000);
            }
        }
    </script>
</body>
</html>
