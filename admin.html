<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 问茧</title>
    <meta name="description" content="问茧管理后台，用于审核资源和管理用户">
    <meta name="keywords" content="管理后台,资源审核,用户管理,问茧">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet"></noscript>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" async>
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <style>
        .admin-container {
            min-height: 100vh;
            background: #f5f7fa;
        }
        
        .admin-sidebar {
            width: 250px;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            padding: 2rem 0;
            z-index: 1000;
        }
        
        .admin-logo {
            text-align: center;
            margin-bottom: 2rem;
            padding: 0 2rem;
        }
        
        .admin-logo i {
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }
        
        .admin-logo h2 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--dark-color);
        }
        
        .admin-nav {
            padding: 0 1rem;
        }
        
        .admin-nav-item {
            display: block;
            padding: 1rem 1.5rem;
            color: var(--gray-color);
            text-decoration: none;
            border-radius: var(--radius);
            margin-bottom: 0.5rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        
        .admin-nav-item:hover {
            background: rgba(67, 97, 238, 0.1);
            color: var(--primary-color);
        }
        
        .admin-nav-item.active {
            background: var(--primary-color);
            color: white;
        }
        
        .admin-content {
            margin-left: 250px;
            padding: 2rem;
            min-height: 100vh;
        }
        
        .admin-header {
            background: white;
            padding: 1.5rem 2rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .admin-header h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--dark-color);
        }
        
        .admin-user {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .admin-user-info {
            text-align: right;
        }
        
        .admin-user-name {
            font-weight: 600;
            color: var(--dark-color);
        }
        
        .admin-user-role {
            font-size: 0.85rem;
            color: var(--gray-color);
        }
        
        .admin-card {
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            padding: 2rem;
            margin-bottom: 2rem;
        }
        
        .admin-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .admin-card-title {
            margin: 0;
            font-size: 1.25rem;
            color: var(--dark-color);
        }
        
        .admin-btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .admin-btn-primary {
            background: var(--primary-color);
            color: white;
        }
        
        .admin-btn-primary:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
        }
        
        .admin-btn-secondary {
            background: var(--light-gray);
            color: var(--dark-color);
        }
        
        .admin-btn-secondary:hover {
            background: var(--gray-color);
            color: white;
        }
        
        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .admin-table th,
        .admin-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--light-gray);
        }
        
        .admin-table th {
            background: var(--light-gray);
            font-weight: 600;
            color: var(--dark-color);
        }
        
        .admin-table tr:hover {
            background: rgba(67, 97, 238, 0.05);
        }
        
        .admin-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .admin-badge-pending {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }
        
        .admin-badge-approved {
            background: rgba(40, 167, 69, 0.2);
            color: #28a745;
        }
        
        .admin-badge-rejected {
            background: rgba(220, 53, 69, 0.2);
            color: #dc3545;
        }
        
        .admin-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .admin-action-btn {
            padding: 0.25rem 0.75rem;
            border: none;
            border-radius: var(--radius);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .admin-action-approve {
            background: rgba(40, 167, 69, 0.2);
            color: #28a745;
        }
        
        .admin-action-approve:hover {
            background: #28a745;
            color: white;
        }
        
        .admin-action-reject {
            background: rgba(220, 53, 69, 0.2);
            color: #dc3545;
        }
        
        .admin-action-reject:hover {
            background: #dc3545;
            color: white;
        }
        
        .admin-action-view {
            background: rgba(67, 97, 238, 0.2);
            color: var(--primary-color);
        }
        
        .admin-action-view:hover {
            background: var(--primary-color);
            color: white;
        }
        
        @media (max-width: 768px) {
            .admin-sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }
            
            .admin-content {
                margin-left: 0;
                padding: 1rem;
            }
            
            .admin-nav {
                display: flex;
                overflow-x: auto;
                gap: 0.5rem;
            }
            
            .admin-nav-item {
                white-space: nowrap;
            }
        }
    </style>
</head>
<body>
    <!-- 管理后台容器 -->
    <div class="admin-container">
        <!-- 侧边栏 -->
        <div class="admin-sidebar">
            <div class="admin-logo">
                <i class="fas fa-shield-alt"></i>
                <h2>管理后台</h2>
            </div>
            <nav class="admin-nav">
                <a href="#resources" class="admin-nav-item active" data-tab="resources">
                    <i class="fas fa-book"></i>
                    <span>资源审核</span>
                </a>
                <a href="#add-resource" class="admin-nav-item" data-tab="add-resource">
                    <i class="fas fa-plus-circle"></i>
                    <span>添加资源</span>
                </a>
                <a href="#users" class="admin-nav-item" data-tab="users">
                    <i class="fas fa-users"></i>
                    <span>用户管理</span>
                </a>
                <a href="#stats" class="admin-nav-item" data-tab="stats">
                    <i class="fas fa-chart-bar"></i>
                    <span>统计分析</span>
                </a>
                <a href="#settings" class="admin-nav-item" data-tab="settings">
                    <i class="fas fa-cog"></i>
                    <span>系统设置</span>
                </a>
            </nav>
        </div>
        
        <!-- 主内容区 -->
        <div class="admin-content">
            <!-- 头部 -->
            <div class="admin-header">
                <h1>资源审核</h1>
                <div class="admin-user">
                    <div class="admin-user-info">
                        <div class="admin-user-name" id="admin-username">管理员</div>
                        <div class="admin-user-role">系统管理员</div>
                    </div>
                    <div class="user-avatar">
                        <i class="fas fa-user-circle" style="font-size: 2rem; color: var(--primary-color);"></i>
                    </div>
                </div>
            </div>
            
            <!-- 资源审核卡片 -->
            <div class="admin-card" id="resources-tab">
                <div class="admin-card-header">
                    <h3 class="admin-card-title">待审核资源</h3>
                    <button class="admin-btn admin-btn-secondary" id="refresh-resources">
                        <i class="fas fa-sync"></i>
                        刷新列表
                    </button>
                </div>
                <div class="admin-table-container">
                    <table class="admin-table" id="resources-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>标题</th>
                                <th>描述</th>
                                <th>链接</th>
                                <th>分类</th>
                                <th>年级</th>
                                <th>免费</th>
                                <th>提交者</th>
                                <th>提交时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="resources-body">
                            <!-- 动态生成内容 -->
                        </tbody>
                    </table>
                </div>
            </div>
            
            <!-- 添加资源卡片 -->
            <div class="admin-card" id="add-resource-tab" style="display: none;">
                <div class="admin-card-header">
                    <h3 class="admin-card-title">添加资源</h3>
                    <button class="admin-btn admin-btn-secondary" id="reset-form">
                        <i class="fas fa-sync"></i>
                        重置表单
                    </button>
                </div>
                <div class="form-container" style="max-width: 100%; padding: 2rem;">
                    <!-- 表单切换标签 -->
                    <div class="form-tabs">
                        <button class="form-tab active" data-tab="add-website">添加网址</button>
                        <button class="form-tab" data-tab="add-information">添加信息</button>
                    </div>

                    <!-- 添加表单 -->
                    <form id="addResourceForm" onsubmit="return handleAddResource(event)">
                        <!-- 网站类表单 -->
                        <div class="form-content active" data-tab="add-website">
                            <div class="form-group">
                                <label for="addResourceTitle" class="form-label">资源标题 *</label>
                                <input type="text" id="addResourceTitle" class="form-input" placeholder="请输入资源标题" required>
                                <div class="error-message" id="addResourceTitleError">请输入资源标题</div>
                            </div>

                            <div class="form-group">
                                <label for="addResourceUrl" class="form-label">资源链接 *</label>
                                <input type="url" id="addResourceUrl" class="form-input" placeholder="请输入资源链接（http:// 或 https://）" required>
                                <div class="error-message" id="addResourceUrlError">请输入有效的资源链接</div>
                            </div>

                            <div class="form-group">
                                <label for="addResourceDescription" class="form-label">资源描述 *</label>
                                <textarea id="addResourceDescription" class="form-textarea" placeholder="请详细描述资源的内容和价值" required></textarea>
                                <div class="error-message" id="addResourceDescriptionError">请输入资源描述</div>
                            </div>

                            <div class="form-group">
                                <label for="addResourceGrade" class="form-label">适用年级</label>
                                <select id="addResourceGrade" class="form-select">
                                    <option value="all">全部年级</option>
                                    <option value="freshman">大一</option>
                                    <option value="sophomore">大二</option>
                                    <option value="junior">大三</option>
                                    <option value="senior">大四</option>
                                    <option value="graduate">研究生</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="addResourceTags" class="form-label">标签（用逗号分隔）</label>
                                <input type="text" id="addResourceTags" class="form-input" placeholder="例如：学习,免费,编程">
                            </div>

                            <div class="form-group">
                                <label class="form-label">是否免费</label>
                                <div class="form-checkbox">
                                    <input type="checkbox" id="addResourceFree" checked>
                                    <label for="addResourceFree">是，免费资源</label>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="addResourceRating" class="form-label">初始评分</label>
                                <select id="addResourceRating" class="form-select">
                                    <option value="0">0</option>
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4" selected>4</option>
                                    <option value="5">5</option>
                                </select>
                            </div>
                        </div>

                        <!-- 信息类表单 -->
                        <div class="form-content" data-tab="add-information">
                            <div class="form-group">
                                <label for="addInfoTitle" class="form-label">信息标题 *</label>
                                <input type="text" id="addInfoTitle" class="form-input" placeholder="请输入信息标题" required>
                                <div class="error-message" id="addInfoTitleError">请输入信息标题</div>
                            </div>

                            <div class="form-group">
                                <label for="addInfoDescription" class="form-label">信息描述 *</label>
                                <textarea id="addInfoDescription" class="form-textarea" placeholder="请详细描述信息的内容和价值" required></textarea>
                                <div class="error-message" id="addInfoDescriptionError">请输入信息描述</div>
                            </div>

                            <div class="form-group">
                                <label for="addInfoContent" class="form-label">信息内容 *</label>
                                <textarea id="addInfoContent" class="form-textarea" placeholder="请输入详细的信息内容" required style="min-height: 200px;"></textarea>
                                <div class="error-message" id="addInfoContentError">请输入信息内容</div>
                            </div>

                            <div class="form-group">
                                <label for="addInfoUrl" class="form-label">相关链接（选填）</label>
                                <input type="url" id="addInfoUrl" class="form-input" placeholder="请输入相关链接（http:// 或 https://）">
                                <div class="error-message" id="addInfoUrlError">请输入有效的链接</div>
                            </div>

                            <div class="form-group">
                                <label for="addInfoGrade" class="form-label">适用年级</label>
                                <select id="addInfoGrade" class="form-select">
                                    <option value="all">全部年级</option>
                                    <option value="freshman">大一</option>
                                    <option value="sophomore">大二</option>
                                    <option value="junior">大三</option>
                                    <option value="senior">大四</option>
                                    <option value="graduate">研究生</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="addInfoTags" class="form-label">标签（用逗号分隔）</label>
                                <input type="text" id="addInfoTags" class="form-input" placeholder="例如：学习,资讯,竞赛">
                            </div>

                            <div class="form-group">
                                <label class="form-label">是否免费</label>
                                <div class="form-checkbox">
                                    <input type="checkbox" id="addInfoFree" checked>
                                    <label for="addInfoFree">是，免费信息</label>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="addInfoRating" class="form-label">初始评分</label>
                                <select id="addInfoRating" class="form-select">
                                    <option value="0">0</option>
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4" selected>4</option>
                                    <option value="5">5</option>
                                </select>
                            </div>
                        </div>

                        <!-- 成功消息 -->
                        <div class="success-message" id="addResourceSuccess">
                            <h3><i class="fas fa-check-circle"></i> 添加成功！</h3>
                            <p>资源已成功添加到资源库。</p>
                        </div>

                        <div class="form-actions">
                            <button type="button" class="btn btn-secondary" onclick="document.getElementById('addResourceForm').reset()">
                                <i class="fas fa-redo"></i> 重置
                            </button>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> 保存资源
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            
            <!-- 用户管理卡片 -->
            <div class="admin-card" id="users-tab" style="display: none;">
                <div class="admin-card-header">
                    <h3 class="admin-card-title">用户管理</h3>
                    <button class="admin-btn admin-btn-primary" id="add-user">
                        <i class="fas fa-plus"></i>
                        添加用户
                    </button>
                </div>
                <div class="admin-table-container">
                    <table class="admin-table" id="users-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>用户名</th>
                                <th>邮箱</th>
                                <th>积分</th>
                                <th>角色</th>
                                <th>注册时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="users-body">
                            <!-- 动态生成内容 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript文件 -->
    <script src="js/main.js"></script>
    <script>
        // 确保UserManager和PointsManager在全局作用域可用
        window.UserManager = UserManager;
        window.PointsManager = PointsManager;
        
        document.addEventListener('DOMContentLoaded', function() {
            // 检查是否为管理员
            try {
                if (!UserManager.isAdmin()) {
                    alert('您没有管理员权限');
                    window.location.href = 'index.html';
                    return;
                }
                
                // 更新管理员名称
                const user = UserManager.getCurrentUser();
                if (user && document.getElementById('admin-username')) {
                    document.getElementById('admin-username').textContent = user.username;
                }
                
                // 标签切换
                const navItems = document.querySelectorAll('.admin-nav-item');
                const tabs = ['resources-tab', 'add-resource-tab', 'users-tab'];
                
                if (navItems.length > 0) {
                    navItems.forEach(item => {
                        item.addEventListener('click', function(e) {
                            e.preventDefault();
                            
                            // 移除所有活动状态
                            navItems.forEach(nav => nav.classList.remove('active'));
                            tabs.forEach(tab => {
                                const tabElement = document.getElementById(tab);
                                if (tabElement) {
                                    tabElement.style.display = 'none';
                                }
                            });
                            
                            // 添加活动状态
                            this.classList.add('active');
                            const tabId = this.getAttribute('data-tab') + '-tab';
                            const targetTab = document.getElementById(tabId);
                            if (targetTab) {
                                targetTab.style.display = 'block';
                            }
                            
                            // 更新标题
                            const headerTitle = document.querySelector('.admin-header h1');
                            if (headerTitle && this.querySelector('span')) {
                                headerTitle.textContent = this.querySelector('span').textContent;
                            }
                        });
                    });
                }
                
                // 添加资源表单标签切换
                const formTabs = document.querySelectorAll('.form-tab');
                const formContents = document.querySelectorAll('.form-content');
                
                if (formTabs.length > 0) {
                    formTabs.forEach(tab => {
                        tab.addEventListener('click', function() {
                            const tabId = this.getAttribute('data-tab');
                            
                            // 更新标签状态
                            formTabs.forEach(t => t.classList.remove('active'));
                            this.classList.add('active');
                            
                            // 更新内容显示
                            formContents.forEach(content => {
                                content.classList.remove('active');
                                if (content.getAttribute('data-tab') === tabId) {
                                    content.classList.add('active');
                                }
                            });
                        });
                    });
                }
                
                // 加载待审核资源
                loadPendingResources();
                
                // 加载用户列表
                loadUsers();
                
                // 刷新按钮事件
                const refreshBtn = document.getElementById('refresh-resources');
                if (refreshBtn) {
                    refreshBtn.addEventListener('click', loadPendingResources);
                }
                
                // 重置表单按钮事件
                const resetBtn = document.getElementById('reset-form');
                if (resetBtn) {
                    resetBtn.addEventListener('click', function() {
                        const form = document.getElementById('addResourceForm');
                        if (form) {
                            form.reset();
                        }
                    });
                }
            } catch (error) {
                console.error('后台页面初始化失败:', error);
                // 即使出错也不阻止页面加载
            }
        });
        
        // 处理添加资源
        function handleAddResource(event) {
            event.preventDefault();
            
            // 隐藏成功消息
            document.getElementById('addResourceSuccess').style.display = 'none';
            
            // 获取当前活动的表单标签
            const activeTab = document.querySelector('.form-tab.active').getAttribute('data-tab');
            
            let resourceData;
            
            if (activeTab === 'add-website') {
                // 网站类资源
                const title = document.getElementById('addResourceTitle').value.trim();
                const url = document.getElementById('addResourceUrl').value.trim();
                const description = document.getElementById('addResourceDescription').value.trim();
                const grade = document.getElementById('addResourceGrade').value;
                const tags = document.getElementById('addResourceTags').value.split(',').map(tag => tag.trim()).filter(tag => tag);
                const free = document.getElementById('addResourceFree').checked;
                const rating = parseInt(document.getElementById('addResourceRating').value);
                
                // 验证
                if (!title) {
                    document.getElementById('addResourceTitleError').style.display = 'block';
                    return false;
                } else {
                    document.getElementById('addResourceTitleError').style.display = 'none';
                }
                
                if (!url || !isValidUrl(url)) {
                    document.getElementById('addResourceUrlError').style.display = 'block';
                    return false;
                } else {
                    document.getElementById('addResourceUrlError').style.display = 'none';
                }
                
                if (!description) {
                    document.getElementById('addResourceDescriptionError').style.display = 'block';
                    return false;
                } else {
                    document.getElementById('addResourceDescriptionError').style.display = 'none';
                }
                
                resourceData = {
                    id: Date.now(),
                    title: title,
                    description: description,
                    url: url,
                    category: 'website',
                    grade: grade,
                    free: free,
                    rating: rating,
                    tags: tags
                };
            } else {
                // 信息类资源
                const title = document.getElementById('addInfoTitle').value.trim();
                const description = document.getElementById('addInfoDescription').value.trim();
                const content = document.getElementById('addInfoContent').value.trim();
                const url = document.getElementById('addInfoUrl').value.trim();
                const grade = document.getElementById('addInfoGrade').value;
                const tags = document.getElementById('addInfoTags').value.split(',').map(tag => tag.trim()).filter(tag => tag);
                const free = document.getElementById('addInfoFree').checked;
                const rating = parseInt(document.getElementById('addInfoRating').value);
                
                // 验证
                if (!title) {
                    document.getElementById('addInfoTitleError').style.display = 'block';
                    return false;
                } else {
                    document.getElementById('addInfoTitleError').style.display = 'none';
                }
                
                if (!description) {
                    document.getElementById('addInfoDescriptionError').style.display = 'block';
                    return false;
                } else {
                    document.getElementById('addInfoDescriptionError').style.display = 'none';
                }
                
                if (!content) {
                    document.getElementById('addInfoContentError').style.display = 'block';
                    return false;
                } else {
                    document.getElementById('addInfoContentError').style.display = 'none';
                }
                
                if (url && !isValidUrl(url)) {
                    document.getElementById('addInfoUrlError').style.display = 'block';
                    return false;
                } else {
                    document.getElementById('addInfoUrlError').style.display = 'none';
                }
                
                resourceData = {
                    id: Date.now(),
                    title: title,
                    description: description,
                    content: content,
                    url: url,
                    category: 'information',
                    grade: grade,
                    free: free,
                    rating: rating,
                    tags: tags
                };
            }
            
            // 保存资源
            saveResource(resourceData);
            
            // 显示成功消息
            document.getElementById('addResourceSuccess').style.display = 'block';
            
            // 重置表单
            document.getElementById('addResourceForm').reset();
            
            return false;
        }
        
        // 验证URL
        function isValidUrl(url) {
            try {
                new URL(url);
                return true;
            } catch (error) {
                return false;
            }
        }
        
        // 保存资源
        function saveResource(resource) {
            // 加载现有资源
            const existingResources = JSON.parse(localStorage.getItem('resources') || '[]');
            
            // 添加新资源
            existingResources.push(resource);
            
            // 保存资源
            localStorage.setItem('resources', JSON.stringify(existingResources));
            
            console.log('资源添加成功:', resource);
        }
        
        // 加载待审核资源
        function loadPendingResources() {
            const resourcesBody = document.getElementById('resources-body');
            const pendingResources = JSON.parse(localStorage.getItem('pendingResources') || '[]');
            
            if (pendingResources.length === 0) {
                resourcesBody.innerHTML = `
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 3rem;">
                            <i class="fas fa-check-circle" style="font-size: 3rem; color: var(--primary-color); margin-bottom: 1rem;"></i>
                            <p style="font-size: 1.1rem; color: var(--gray-color);">暂无待审核资源</p>
                        </td>
                    </tr>
                `;
                return;
            }
            
            resourcesBody.innerHTML = '';
            
            pendingResources.forEach(resource => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${resource.id}</td>
                    <td>${resource.title}</td>
                    <td>${resource.description.substring(0, 50)}${resource.description.length > 50 ? '...' : ''}</td>
                    <td><a href="${resource.url}" target="_blank">${resource.url.substring(0, 30)}${resource.url.length > 30 ? '...' : ''}</a></td>
                    <td>${resource.category}</td>
                    <td>${resource.grade}</td>
                    <td>${resource.free ? '是' : '否'}</td>
                    <td>${resource.submitter}</td>
                    <td>${new Date(resource.submittedAt).toLocaleString()}</td>
                    <td class="admin-actions">
                        <button class="admin-action-btn admin-action-view" onclick="viewResource(${resource.id})">查看</button>
                        <button class="admin-action-btn admin-action-approve" onclick="approveResource(${resource.id})">通过</button>
                        <button class="admin-action-btn admin-action-reject" onclick="rejectResource(${resource.id})">拒绝</button>
                    </td>
                `;
                resourcesBody.appendChild(row);
            });
        }
        
        // 加载用户列表
        function loadUsers() {
            const usersBody = document.getElementById('users-body');
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            
            if (users.length === 0) {
                usersBody.innerHTML = `
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 3rem;">
                            <i class="fas fa-users" style="font-size: 3rem; color: var(--primary-color); margin-bottom: 1rem;"></i>
                            <p style="font-size: 1.1rem; color: var(--gray-color);">暂无用户</p>
                        </td>
                    </tr>
                `;
                return;
            }
            
            usersBody.innerHTML = '';
            
            users.forEach(user => {
                const row = document.createElement('tr');
                const userPoints = PointsManager.getUserPoints(user.username);
                const role = user.role || 'user';
                
                row.innerHTML = `
                    <td>${user.id}</td>
                    <td>${user.username}</td>
                    <td>${user.email}</td>
                    <td>${userPoints.points}</td>
                    <td>${role === 'admin' ? '管理员' : '普通用户'}</td>
                    <td>${new Date(user.createdAt).toLocaleString()}</td>
                    <td class="admin-actions">
                        <button class="admin-action-btn admin-action-view" onclick="viewUser(${user.id})">查看</button>
                        ${role !== 'admin' ? '<button class="admin-action-btn admin-action-approve" onclick="makeAdmin(${user.id})">设为管理员</button>' : ''}
                    </td>
                `;
                usersBody.appendChild(row);
            });
        }
        
        // 查看资源
        function viewResource(resourceId) {
            const pendingResources = JSON.parse(localStorage.getItem('pendingResources') || '[]');
            const resource = pendingResources.find(r => r.id === resourceId);
            
            if (resource) {
                alert(`资源详情：
标题：${resource.title}
描述：${resource.description}
链接：${resource.url}
分类：${resource.category}
年级：${resource.grade}
是否免费：${resource.free ? '是' : '否'}
提交者：${resource.submitter}
提交时间：${new Date(resource.submittedAt).toLocaleString()}`);
            }
        }
        
        // 审核通过资源
        function approveResource(resourceId) {
            if (confirm('确定要通过这个资源吗？')) {
                const pendingResources = JSON.parse(localStorage.getItem('pendingResources') || '[]');
                const resourceIndex = pendingResources.findIndex(r => r.id === resourceId);
                
                if (resourceIndex !== -1) {
                    const resource = pendingResources[resourceIndex];
                    
                    // 加载现有资源
                    const existingResources = JSON.parse(localStorage.getItem('resources') || '[]');
                    
                    // 添加新资源
                    existingResources.push({
                        id: existingResources.length + 1,
                        title: resource.title,
                        description: resource.description,
                        url: resource.url,
                        category: resource.category,
                        grade: resource.grade,
                        free: resource.free,
                        rating: 0,
                        tags: resource.tags || []
                    });
                    
                    // 保存资源
                    localStorage.setItem('resources', JSON.stringify(existingResources));
                    
                    // 从待审核列表中移除
                    pendingResources.splice(resourceIndex, 1);
                    localStorage.setItem('pendingResources', JSON.stringify(pendingResources));
                    
                    // 给用户添加积分（审核通过额外积分）
                    PointsManager.addPoints(resource.submitter, 20, 'resourceApproved');
                    
                    alert('资源审核通过！');
                    loadPendingResources();
                }
            }
        }
        
        // 拒绝资源
        function rejectResource(resourceId) {
            if (confirm('确定要拒绝这个资源吗？')) {
                const pendingResources = JSON.parse(localStorage.getItem('pendingResources') || '[]');
                const resourceIndex = pendingResources.findIndex(r => r.id === resourceId);
                
                if (resourceIndex !== -1) {
                    // 从待审核列表中移除
                    pendingResources.splice(resourceIndex, 1);
                    localStorage.setItem('pendingResources', JSON.stringify(pendingResources));
                    
                    alert('资源已拒绝！');
                    loadPendingResources();
                }
            }
        }
        
        // 查看用户
        function viewUser(userId) {
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.id === userId);
            
            if (user) {
                const userPoints = PointsManager.getUserPoints(user.username);
                alert(`用户详情：
用户名：${user.username}
邮箱：${user.email}
积分：${userPoints.points}
角色：${user.role || '普通用户'}
注册时间：${new Date(user.createdAt).toLocaleString()}`);
            }
        }
        
        // 设置为管理员
        function makeAdmin(userId) {
            if (confirm('确定要将此用户设为管理员吗？')) {
                const users = JSON.parse(localStorage.getItem('users') || '[]');
                const userIndex = users.findIndex(u => u.id === userId);
                
                if (userIndex !== -1) {
                    users[userIndex].role = 'admin';
                    localStorage.setItem('users', JSON.stringify(users));
                    
                    alert('用户已设为管理员！');
                    loadUsers();
                }
            }
        }
    </script>
</body>
</html>
