    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            padding: 2rem;
        }
        
        .auth-card {
            background: white;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            position: relative;
            overflow: hidden;
        }
        
        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
        }
        
        .auth-tabs {
            display: flex;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--light-gray);
        }
        
        .auth-tab {
            flex: 1;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: var(--gray-color);
            transition: all 0.3s ease;
            border-bottom: 2px solid transparent;
        }
        
        .auth-tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }
        
        .auth-form {
            display: none;
        }
        
        .auth-form.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--dark-color);
        }
        
        .form-group input {
            width: 100%;
            padding: 1rem;
            border: 2px solid var(--light-gray);
            border-radius: var(--radius);
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
        }
        
        .form-group .error {
            color: var(--accent-color);
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }
        
        .auth-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 1.5rem;
        }
        
        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(67, 97, 238, 0.3);
        }
        
        .auth-footer {
            text-align: center;
            color: var(--gray-color);
            font-size: 0.9rem;
        }
        
        .auth-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }
        
        .auth-footer a:hover {
            text-decoration: underline;
        }
        
        .social-login {
            margin: 1.5rem 0;
            text-align: center;
        }
        
        .social-login p {
            color: var(--gray-color);
            margin-bottom: 1rem;
            position: relative;
        }
        
        .social-login p::before,
        .social-login p::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background: var(--light-gray);
        }
        
        .social-login p::before {
            left: 0;
        }
        
        .social-login p::after {
            right: 0;
        }
        
        .social-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        
        .social-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--light-gray);
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .social-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .social-btn i {
            font-size: 1.1rem;
        }
        
        .social-btn.facebook i {
            color: #3b5998;
        }
        
        .social-btn.google i {
            color: #db4437;
        }
        
        .social-btn.github i {
            color: #333;
        }
        
        @media (max-width: 768px) {
            .auth-container {
                padding: 1rem;
            }
            
            .auth-card {
                padding: 2rem;
            }
            
            .auth-tab {
                padding: 0.8rem;
                font-size: 0.9rem;
            }
            
            .form-group input {
                padding: 0.8rem;
            }
            
            .auth-btn {
                padding: 0.8rem;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- 认证容器 -->
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-tabs">
                <div class="auth-tab active" data-tab="login">登录</div>
                <div class="auth-tab" data-tab="register">注册</div>
            </div>
            
            <!-- 登录表单 -->
            <form class="auth-form active" id="login-form">
                <div class="form-group">
                    <label for="login-email">邮箱</label>
                    <input type="email" id="login-email" placeholder="请输入邮箱地址" required>
                    <div class="error" id="login-email-error"></div>
                </div>
                <div class="form-group">
                    <label for="login-password">密码</label>
                    <input type="password" id="login-password" placeholder="请输入密码" required>
                    <div class="error" id="login-password-error"></div>
                </div>
                <div class="form-group" style="display: flex; align-items: center; justify-content: space-between;">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember-me">
                        <span class="checkbox-custom"></span>
                        <span class="checkbox-text">记住我</span>
                    </label>
                    <a href="#" style="color: var(--primary-color); text-decoration: none; font-size: 0.9rem;">忘记密码？</a>
                </div>
                <button type="submit" class="auth-btn">
                    <i class="fas fa-sign-in-alt"></i> 登录
                </button>
                

            </form>
            
            <!-- 注册表单 -->
            <form class="auth-form" id="register-form">
                <div class="form-group">
                    <label for="register-username">用户名</label>
                    <input type="text" id="register-username" placeholder="请输入用户名" required>
                    <div class="error" id="register-username-error"></div>
                </div>
                <div class="form-group">
                    <label for="register-email">邮箱</label>
                    <input type="email" id="register-email" placeholder="请输入邮箱地址" required>
                    <div class="error" id="register-email-error"></div>
                </div>
                <div class="form-group">
                    <label for="register-password">密码</label>
                    <input type="password" id="register-password" placeholder="请输入密码（至少6位）" required>
                    <div class="error" id="register-password-error"></div>
                </div>
                <div class="form-group">
                    <label for="register-confirm-password">确认密码</label>
                    <input type="password" id="register-confirm-password" placeholder="请再次输入密码" required>
                    <div class="error" id="register-confirm-password-error"></div>
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="agree-terms" required>
                        <span class="checkbox-custom"></span>
                        <span class="checkbox-text">我已阅读并同意<a href="#" style="color: var(--primary-color);">用户协议</a>和<a href="#" style="color: var(--primary-color);">隐私政策</a></span>
                    </label>
                </div>
                <button type="submit" class="auth-btn">
                    <i class="fas fa-user-plus"></i> 注册
                </button>
            </form>
            
            <div class="auth-footer">
                <p id="footer-text">还没有账号？<a href="#" id="toggle-register">立即注册</a></p>
            </div>
        </div>
    </div>

    <!-- JavaScript文件 -->
    <script src="js/main.js"></script>
    <script>
        // 认证页面脚本
        document.addEventListener('DOMContentLoaded', function() {
            // 标签切换
            const tabs = document.querySelectorAll('.auth-tab');
            const forms = document.querySelectorAll('.auth-form');
            const footerText = document.getElementById('footer-text');
            const toggleRegister = document.getElementById('toggle-register');
            
            tabs.forEach(tab => {
                tab.addEventListener('click', function() {
                    const tabId = this.getAttribute('data-tab');
                    
                    // 切换标签
                    tabs.forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    
                    // 切换表单
                    forms.forEach(form => form.classList.remove('active'));
                    document.getElementById(`${tabId}-form`).classList.add('active');
                    
                    // 更新页脚文本
                    if (tabId === 'login') {
                        footerText.innerHTML = '还没有账号？<a href="#" id="toggle-register">立即注册</a>';
                    } else {
                        footerText.innerHTML = '已有账号？<a href="#" id="toggle-login">立即登录</a>';
                    }
                    
                    // 重新绑定切换事件
                    if (tabId === 'login') {
                        document.getElementById('toggle-register').addEventListener('click', function(e) {
                            e.preventDefault();
                            document.querySelector('[data-tab="register"]').click();
                        });
                    } else {
                        document.getElementById('toggle-login').addEventListener('click', function(e) {
                            e.preventDefault();
                            document.querySelector('[data-tab="login"]').click();
                        });
                    }
                });
            });
            
            // 登录表单提交
            const loginForm = document.getElementById('login-form');
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                // 表单验证
                if (validateLoginForm()) {
                    // 模拟登录
                    const email = document.getElementById('login-email').value;
                    const password = document.getElementById('login-password').value;
                    const rememberMe = document.getElementById('remember-me').checked;
                    
                    // 检查用户是否存在
                    const users = JSON.parse(localStorage.getItem('users') || '[]');
                    const user = users.find(u => u.email === email && u.password === password);
                    
                    if (user) {
                        // 登录成功
                        localStorage.setItem('currentUser', JSON.stringify(user));
                        
                        // 初始化用户积分
                        PointsManager.initUserPoints(user.username);
                        // 领取每日登录积分
                        PointsManager.claimDailyLoginPoints(user.username);
                        
                        // 显示成功消息
                        alert('登录成功！');
                        
                        // 跳转到首页
                        window.location.href = 'index.html';
                    } else {
                        // 登录失败
                        document.getElementById('login-email-error').textContent = '邮箱或密码错误';
                    }
                }
            });
            
            // 注册表单提交
            const registerForm = document.getElementById('register-form');
            registerForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                // 表单验证
                if (validateRegisterForm()) {
                    // 模拟注册
                    const username = document.getElementById('register-username').value;
                    const email = document.getElementById('register-email').value;
                    const password = document.getElementById('register-password').value;
                    
                    // 检查用户是否已存在
                    const users = JSON.parse(localStorage.getItem('users') || '[]');
                    const existingUser = users.find(u => u.email === email);
                    
                    if (existingUser) {
                        document.getElementById('register-email-error').textContent = '该邮箱已被注册';
                    } else {
                        // 创建新用户
                        const newUser = {
                            id: Date.now(),
                            username: username,
                            email: email,
                            password: password,
                            createdAt: new Date().toISOString()
                        };
                        
                        // 保存用户
                        users.push(newUser);
                        localStorage.setItem('users', JSON.stringify(users));
                        localStorage.setItem('currentUser', JSON.stringify(newUser));
                        
                        // 初始化用户积分
                        PointsManager.initUserPoints(newUser.username);
                        // 领取每日登录积分
                        PointsManager.claimDailyLoginPoints(newUser.username);
                        
                        // 显示成功消息
                        alert('注册成功！');
                        
                        // 跳转到首页
                        window.location.href = 'index.html';
                    }
                }
            });
            
            // 登录表单验证
            function validateLoginForm() {
                let isValid = true;
                
                const email = document.getElementById('login-email');
                const password = document.getElementById('login-password');
                
                // 邮箱验证
                if (!email.value) {
                    document.getElementById('login-email-error').textContent = '请输入邮箱';
                    isValid = false;
                } else if (!isValidEmail(email.value)) {
                    document.getElementById('login-email-error').textContent = '请输入有效的邮箱地址';
                    isValid = false;
                } else {
                    document.getElementById('login-email-error').textContent = '';
                }
                
                // 密码验证
                if (!password.value) {
                    document.getElementById('login-password-error').textContent = '请输入密码';
                    isValid = false;
                } else {
                    document.getElementById('login-password-error').textContent = '';
                }
                
                return isValid;
            }
            
            // 注册表单验证
            function validateRegisterForm() {
                let isValid = true;
                
                const username = document.getElementById('register-username');
                const email = document.getElementById('register-email');
                const password = document.getElementById('register-password');
                const confirmPassword = document.getElementById('register-confirm-password');
                const agreeTerms = document.getElementById('agree-terms');
                
                // 用户名验证
                if (!username.value) {
                    document.getElementById('register-username-error').textContent = '请输入用户名';
                    isValid = false;
                } else if (username.value.length < 3) {
                    document.getElementById('register-username-error').textContent = '用户名至少3个字符';
                    isValid = false;
                } else {
                    document.getElementById('register-username-error').textContent = '';
                }
                
                // 邮箱验证
                if (!email.value) {
                    document.getElementById('register-email-error').textContent = '请输入邮箱';
                    isValid = false;
                } else if (!isValidEmail(email.value)) {
                    document.getElementById('register-email-error').textContent = '请输入有效的邮箱地址';
                    isValid = false;
                } else {
                    document.getElementById('register-email-error').textContent = '';
                }
                
                // 密码验证
                if (!password.value) {
                    document.getElementById('register-password-error').textContent = '请输入密码';
                    isValid = false;
                } else if (password.value.length < 6) {
                    document.getElementById('register-password-error').textContent = '密码至少6个字符';
                    isValid = false;
                } else {
                    document.getElementById('register-password-error').textContent = '';
                }
                
                // 确认密码验证
                if (!confirmPassword.value) {
                    document.getElementById('register-confirm-password-error').textContent = '请确认密码';
                    isValid = false;
                } else if (confirmPassword.value !== password.value) {
                    document.getElementById('register-confirm-password-error').textContent = '两次输入的密码不一致';
                    isValid = false;
                } else {
                    document.getElementById('register-confirm-password-error').textContent = '';
                }
                
                // 同意条款验证
                if (!agreeTerms.checked) {
                    alert('请阅读并同意用户协议和隐私政策');
                    isValid = false;
                }
                
                return isValid;
            }
            
            // 邮箱格式验证
            function isValidEmail(email) {
                const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return re.test(email);
            }
            
            // 绑定切换注册事件
            toggleRegister.addEventListener('click', function(e) {
                e.preventDefault();
                document.querySelector('[data-tab="register"]').click();
            });
            
            // 社交登录按钮
            document.querySelectorAll('.social-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const platform = this.classList[1];
                    alert(`${platform} 登录功能暂未开放，敬请期待！`);
                });
            });
        });
    </script>
